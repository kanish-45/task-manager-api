apiVersion: v1
kind: Pod
metadata:
  name: memory-hog
spec:
  containers:
    - name: stress
      image: polinux/stress
      args:
        - stress
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "500M"
        - "--vm-hang"
        - "1"

      resources:
        limits:
          memory: "200Mi"